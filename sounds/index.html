<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>הצליל הפותח – Amalia Kids Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&family=Suez+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- רקע חגיגי: שמש, עננים, גבעות, פרחים ודגלונים -->
    <div class="scene" aria-hidden="true">
      <div class="scene__sun"></div>
      <div class="scene__cloud scene__cloud--a"></div>
      <div class="scene__cloud scene__cloud--b"></div>
      <div class="scene__cloud scene__cloud--c"></div>

      <svg class="scene__hills" viewBox="0 0 1200 320" preserveAspectRatio="none">
        <path d="M0 150 Q160 80 340 140 T700 130 T1040 150 T1200 120 V320 H0 Z" fill="#cbe9d4" />
        <path d="M0 200 Q200 140 420 195 T820 185 T1200 205 V320 H0 Z" fill="#a8dcbb" />
        <path d="M0 258 Q240 215 520 255 T1000 248 T1200 262 V320 H0 Z" fill="#8ccfa4" />
      </svg>

      <svg class="scene__flowers" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <g fill="#ffffff" opacity=".85">
          <circle cx="90" cy="78" r="7" /><circle cx="300" cy="94" r="6" />
          <circle cx="520" cy="72" r="7" /><circle cx="760" cy="90" r="6" />
          <circle cx="980" cy="76" r="7" /><circle cx="1130" cy="96" r="6" />
        </g>
        <g fill="#f6c94f">
          <circle cx="90" cy="78" r="3" /><circle cx="300" cy="94" r="2.6" />
          <circle cx="520" cy="72" r="3" /><circle cx="760" cy="90" r="2.6" />
          <circle cx="980" cy="76" r="3" /><circle cx="1130" cy="96" r="2.6" />
        </g>
      </svg>

      <div class="bunting" id="bunting"></div>
    </div>

    <header class="topbar">
      <a class="back-link" href="../index.html">→ חזרה למשחקים</a>
      <h1 class="game-title">🎪 הצליל הפותח</h1>
      <div class="topbar__tools">
        <button class="btn btn--ghost btn--small" id="voice" aria-pressed="true">
          🔊 הקראה
        </button>
        <button class="btn btn--ghost btn--small" id="showWords" aria-pressed="false">
          👁️ מילים
        </button>
        <button class="btn btn--ghost btn--small" id="restart">התחלה מחדש</button>
      </div>
    </header>

    <main class="wrap">
      <p class="speech intro">
        אמרו את שם התמונה בקול — באיזה צליל היא מתחילה? גררו אותה אל האות הנכונה 🎈
      </p>

      <!-- אוסף הבלונים -->
      <section class="prize" aria-label="הבלונים שאספתי">
        <div class="prize__head">
          <span class="prize__title">הבלונים שלי</span>
          <span class="prize__count" id="count">0</span>
        </div>
        <div class="prize__row" id="bouquet"></div>
      </section>

      <p class="round" id="round">שלב 1 מתוך 3</p>

      <!-- שלוש האותיות -->
      <section class="bins" id="bins" aria-label="אותיות"></section>

      <!-- מגש הקלפים -->
      <section class="tray" id="tray" aria-label="קלפים לגרירה"></section>
    </main>

    <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="end-title">
      <div class="overlay__card">
        <span class="overlay__emoji">🎉</span>
        <h2 class="overlay__title" id="end-title">איזו חגיגה!</h2>
        <p class="overlay__text" id="final">אספתם 18 בלונים!</p>
        <div class="overlay__stars" id="stars">⭐ ⭐ ⭐ ⭐ ⭐</div>
        <div class="overlay__actions">
          <button class="btn btn--pink" id="again">שחק שוב</button>
          <a class="btn btn--ghost" href="../index.html">חזרה למשחקים</a>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
